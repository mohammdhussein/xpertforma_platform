{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}XpertForma{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'website/brand/xpertforma-icon.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'website/public/landing.css' %}">
    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}landing-body{% endblock %}">
{% block body %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
